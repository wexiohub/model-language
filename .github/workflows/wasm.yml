name: WASM bridge

# Builds the self-contained WASI module from the TS engine (esbuild + Javy) and
# proves the Python bindings behave identically to the canonical engine by
# running the shared conformance fixtures through them.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  wasm-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Install Javy
        run: |
          url=$(curl -s https://api.github.com/repos/bytecodealliance/javy/releases/latest \
            | grep browser_download_url | grep 'x86_64-linux' | grep -v sha256 \
            | cut -d '"' -f4 | head -1)
          echo "Downloading $url"
          mkdir -p "$HOME/.local/bin"
          curl -L "$url" | gunzip > "$HOME/.local/bin/javy"
          chmod +x "$HOME/.local/bin/javy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/javy" --version

      - name: Build WASM module (esbuild bundle -> Javy)
        run: pnpm wasm:build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install wasmtime pytest

      - name: Run Python conformance tests (parity with TypeScript)
        working-directory: hosts/python
        run: python -m pytest -q

      - name: Build Python wheel (PyPI packaging verify)
        working-directory: hosts/python
        run: |
          cp "${{ github.workspace }}/wasm/dist/model_language.wasm" model_language/model_language.wasm
          python -m pip install build
          python -m build
          ls -la dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go host conformance tests (parity with TypeScript)
        working-directory: hosts/go
        env:
          MODEL_LANGUAGE_WASM: ${{ github.workspace }}/wasm/dist/model_language.wasm
        run: |
          go mod tidy
          go test ./...

      - name: Run Rust host conformance tests (parity with TypeScript)
        working-directory: hosts/rust
        run: |
          cp "${{ github.workspace }}/wasm/dist/model_language.wasm" model_language.wasm
          cargo test
          cargo package --allow-dirty --no-verify   # verify the crate packages for crates.io

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Run Ruby host conformance tests (parity with TypeScript)
        working-directory: hosts/ruby
        env:
          MODEL_LANGUAGE_WASM: ${{ github.workspace }}/wasm/dist/model_language.wasm
        run: |
          cp "$MODEL_LANGUAGE_WASM" lib/model_language.wasm
          bundle install
          bundle exec ruby test/conformance_test.rb
          gem build model-language.gemspec   # verify the gem packages for RubyGems

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run C# host conformance tests (parity with TypeScript)
        working-directory: hosts/csharp
        env:
          MODEL_LANGUAGE_WASM: ${{ github.workspace }}/wasm/dist/model_language.wasm
        run: dotnet run -c Release

      - name: Build & run C++ host conformance tests (parity with TypeScript)
        working-directory: hosts/cpp
        env:
          MODEL_LANGUAGE_WASM: ${{ github.workspace }}/wasm/dist/model_language.wasm
        run: |
          sudo apt-get update && sudo apt-get install -y nlohmann-json3-dev
          url=$(curl -s https://api.github.com/repos/bytecodealliance/wasmtime/releases/latest \
            | grep browser_download_url | grep 'x86_64-linux-c-api.tar.xz' | cut -d '"' -f4 | head -1)
          echo "Downloading $url"
          curl -L "$url" | tar xJ
          capi=$(find . -maxdepth 1 -type d -name 'wasmtime-*-c-api')
          echo "C API at $capi"
          g++ -std=c++17 conformance.cpp -I"$capi/include" \
            "$capi/lib/libwasmtime.a" -lpthread -ldl -lm -o conformance
          ./conformance

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Run Elixir host conformance tests (parity with TypeScript)
        working-directory: hosts/elixir
        env:
          MODEL_LANGUAGE_WASM: ${{ github.workspace }}/wasm/dist/model_language.wasm
        run: elixir conformance.exs
