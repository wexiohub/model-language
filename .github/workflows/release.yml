name: Release

# Push a tag like `v1.0.0` to publish to every registry. Each publish step runs
# only when its token is present in repo secrets, so you can add them
# incrementally (Settings → Secrets and variables → Actions):
#   NPM_TOKEN, PYPI_API_TOKEN, CARGO_REGISTRY_TOKEN,
#   RUBYGEMS_API_KEY, NUGET_API_KEY, HEX_API_KEY
# Go (git) and C++ (vendor) have no registry — nothing to publish there.

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      WASM: ${{ github.workspace }}/wasm/dist/model_language.wasm
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Install & build the WASM module
        run: |
          pnpm install
          url=$(curl -s https://api.github.com/repos/bytecodealliance/javy/releases/latest \
            | grep browser_download_url | grep 'x86_64-linux' | grep -v sha256 \
            | cut -d '"' -f4 | head -1)
          mkdir -p "$HOME/.local/bin"
          curl -L "$url" | gunzip > "$HOME/.local/bin/javy"
          chmod +x "$HOME/.local/bin/javy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build WASM module
        run: pnpm wasm:build

      # ── npm ──────────────────────────────────────────────────────────────
      - name: Publish to npm
        if: ${{ !cancelled() && env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      # ── PyPI ─────────────────────────────────────────────────────────────
      - name: Publish to PyPI
        if: ${{ !cancelled() && env.PYPI_API_TOKEN != '' }}
        working-directory: hosts/python
        run: |
          cp "$WASM" model_language/model_language.wasm
          python -m pip install build twine
          python -m build
          python -m twine upload -u __token__ -p "$PYPI_API_TOKEN" dist/*

      # ── crates.io ────────────────────────────────────────────────────────
      - name: Publish to crates.io
        if: ${{ !cancelled() && env.CARGO_REGISTRY_TOKEN != '' }}
        working-directory: hosts/rust
        run: |
          cp "$WASM" model_language.wasm
          cargo publish --allow-dirty --token "$CARGO_REGISTRY_TOKEN"

      # ── RubyGems ─────────────────────────────────────────────────────────
      - name: Publish to RubyGems
        if: ${{ !cancelled() && env.RUBYGEMS_API_KEY != '' }}
        working-directory: hosts/ruby
        run: |
          cp "$WASM" lib/model_language.wasm
          gem build model-language.gemspec
          mkdir -p "$HOME/.gem"
          printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > "$HOME/.gem/credentials"
          chmod 600 "$HOME/.gem/credentials"
          gem push model-language-1.0.0.gem

      # ── NuGet ────────────────────────────────────────────────────────────
      - name: Publish to NuGet
        if: ${{ !cancelled() && env.NUGET_API_KEY != '' }}
        working-directory: hosts/csharp
        run: |
          cp "$WASM" src/model_language.wasm
          dotnet pack src/ModelLanguage.csproj -c Release
          dotnet nuget push src/bin/Release/ModelLanguage.1.0.0.nupkg \
            --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # ── Hex ──────────────────────────────────────────────────────────────
      - name: Publish to Hex
        if: ${{ !cancelled() && env.HEX_API_KEY != '' }}
        working-directory: hosts/elixir
        run: |
          mkdir -p priv && cp "$WASM" priv/model_language.wasm
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix hex.publish package --yes
